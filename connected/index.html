<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connected — SyncMetrics</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #05060f;
      color: #e8eaf6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(34,197,94,0.08) 0%, transparent 60%);
    }
    .card {
      background: #111326;
      border: 1px solid rgba(34,197,94,0.25);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      max-width: 460px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 60px rgba(34,197,94,0.08);
    }
    .icon {
      width: 72px;
      height: 72px;
      background: rgba(34,197,94,0.12);
      border: 1px solid rgba(34,197,94,0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1.5rem;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 2rem;
    }
    .logo span { color: #4f6ef7; }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 0.75rem;
      letter-spacing: -0.5px;
    }
    p {
      color: #7b82a8;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .steps {
      background: #0d0f1e;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      text-align: left;
      margin-bottom: 2rem;
    }
    .steps p {
      font-size: 0.82rem;
      color: #7b82a8;
      margin-bottom: 0.5rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .step-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.875rem;
      color: #e8eaf6;
      padding: 0.35rem 0;
    }
    .step-item::before {
      content: '✓';
      color: #22c55e;
      font-weight: 700;
      font-size: 0.85rem;
      flex-shrink: 0;
    }
    .btn {
      display: inline-block;
      padding: 0.85rem 2rem;
      background: #4f6ef7;
      color: #fff;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
      box-shadow: 0 0 20px rgba(79,110,247,0.25);
    }
    .btn:hover { background: #3d5ce5; transform: translateY(-1px); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Sync<span>Metrics</span></div>
    <div class="icon">✅</div>
    <h1>Looker Studio Connected!</h1>
    <p>Your SyncMetrics account is now linked to Looker Studio. You can close this tab and continue building your report.</p>
    <div class="steps">
      <p>What's next</p>
      <div class="step-item">Select your Meta Ads account in Looker Studio</div>
      <div class="step-item">Click Connect to load your data</div>
      <div class="step-item">Create your first report</div>
    </div>
    <button class="btn" onclick="window.close()">Close Window</button>
  </div>
</body>
</html>
